version: '3.8'

services:
  kvstore:
    build: ./kv-store
    ports:
      - "6379:6379"
      - "8080:8080"
    environment:
      - CACHE_SIZE=100000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
    networks:
      - app-network

  ml-service:
    build: ./ml-service
    ports:
      - "8000:8000"
    environment:
      - KVSTORE_HOST=kvstore
      - KVSTORE_PORT=6379
    depends_on:
      kvstore:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge